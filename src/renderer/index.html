<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'"
    />
    <title>N.E.K.O. Embedded</title>
    <style>
      :root {
        --bg: #0b0b10;
        --fg: #e8e6f0;
        --muted: #6b6880;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, "PingFang SC", system-ui, sans-serif;
        overflow: hidden;
        cursor: none;
      }
      #stage {
        height: 100vh;
        display: grid;
        place-items: center;
      }
      #expression {
        max-width: 80vmin;
        max-height: 80vmin;
        object-fit: contain;
      }
      #placeholder {
        text-align: center;
        opacity: 0.85;
      }
      #placeholder .title {
        font-size: clamp(2rem, 8vw, 4rem);
        letter-spacing: 0.12em;
        font-weight: 600;
      }
      #placeholder .sub {
        margin-top: 0.6rem;
        font-size: 0.95rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main id="stage">
      <div id="placeholder">
        <div class="title">N.E.K.O.</div>
        <div class="sub" id="status">scaffold ready · 等待接入语音</div>
      </div>
      <img id="expression" alt="" hidden />
    </main>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
